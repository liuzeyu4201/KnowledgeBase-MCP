<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>分类文档列表</title>
    <link rel="stylesheet" href="/assets/css/app.css" />
  </head>
  <body data-page="category">
    <div class="shell">
      <header class="hero hero-compact">
        <div class="hero-grid">
          <div class="hero-main hero-main-category">
            <a class="back-link" href="/ui">返回分类总览</a>
            <p class="eyebrow">Category Documents</p>
            <h1 id="category-title">分类文档列表</h1>
            <p id="category-subtitle" class="hero-copy">正在读取分类信息...</p>
          </div>
          <div class="hero-aside">
            <div class="hero-stat">
              <span class="hero-stat-label">文档总量</span>
              <strong id="hero-document-count">-</strong>
              <span class="hero-stat-note">当前分类下的文档总数</span>
            </div>
            <div class="hero-stat">
              <span class="hero-stat-label">管理建议</span>
              <strong>分页 + 筛选</strong>
              <span class="hero-stat-note">适配文档规模持续增长场景</span>
            </div>
            <div class="hero-action-stack">
              <button id="delete-category-button" class="danger-button" type="button" disabled>删除当前分类</button>
              <span id="delete-category-hint" class="hero-stat-note">只有文档全部删除后才能删除分类</span>
            </div>
          </div>
        </div>
      </header>

      <section class="panel">
        <div class="toolbar">
          <div class="toolbar-group toolbar-group-wide">
            <label class="field">
              <span>文档标题</span>
              <input id="document-title-filter" type="text" placeholder="按标题过滤" />
            </label>
          </div>
          <div class="toolbar-group toolbar-group-wide">
            <label class="field">
              <span>文件名</span>
              <input id="document-file-filter" type="text" placeholder="按 file_name 过滤" />
            </label>
          </div>
          <div class="toolbar-group">
            <label class="field">
              <span>解析状态</span>
              <select id="document-parse-status">
                <option value="">全部</option>
                <option value="success">success</option>
                <option value="failed">failed</option>
                <option value="processing">processing</option>
                <option value="pending">pending</option>
              </select>
            </label>
          </div>
          <div class="toolbar-group">
            <label class="field">
              <span>向量状态</span>
              <select id="document-vector-status">
                <option value="">全部</option>
                <option value="ready">ready</option>
                <option value="failed">failed</option>
                <option value="indexing">indexing</option>
                <option value="pending">pending</option>
              </select>
            </label>
          </div>
          <div class="toolbar-group">
            <label class="field">
              <span>每页数量</span>
              <select id="document-page-size">
                <option value="10">10</option>
                <option value="20" selected>20</option>
                <option value="50">50</option>
              </select>
            </label>
          </div>
          <div class="toolbar-actions">
            <button id="apply-category-filters" class="action-button" type="button">应用筛选</button>
            <button id="refresh-category" class="ghost-button" type="button">刷新</button>
          </div>
        </div>

        <div class="panel-head panel-head-inline">
          <div>
            <h2>文档列表</h2>
            <p id="document-meta">正在读取文档数据...</p>
          </div>
          <div id="document-pagination-summary" class="pagination-summary"></div>
        </div>
        <div id="category-error" class="notice notice-error hidden"></div>
        <div id="document-list" class="document-list"></div>

        <div class="pagination-bar">
          <button id="document-prev-page" class="ghost-button" type="button">上一页</button>
          <div id="document-page-indicator" class="page-indicator">第 1 页</div>
          <button id="document-next-page" class="ghost-button" type="button">下一页</button>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div>
            <h2>任务观察</h2>
            <p>如果 URL 带上 <code>?task_id=任务ID</code>，页面会通过 WebSocket 订阅任务状态。</p>
          </div>
        </div>
        <div id="task-notice" class="notice hidden"></div>
        <pre id="task-log" class="task-log">当前未订阅任务。</pre>
      </section>
    </div>

    <script src="/assets/js/app.js" defer></script>
  </body>
</html>
