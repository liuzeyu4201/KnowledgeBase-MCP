<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>文档 Chunk 原文</title>
    <link rel="stylesheet" href="/assets/css/app.css" />
  </head>
  <body data-page="document-chunks">
    <div class="shell">
      <header class="hero hero-compact">
        <div class="hero-grid">
          <div class="hero-main hero-main-category">
            <a id="chunk-back-link" class="back-link" href="/ui">返回文档原文页</a>
            <p class="eyebrow">Document Chunks</p>
            <h1 id="chunk-title">文档 Chunk 原文</h1>
            <p id="chunk-subtitle" class="hero-copy">正在读取文档与切片信息...</p>
          </div>
          <div class="hero-aside">
            <div class="hero-stat">
              <span class="hero-stat-label">Chunk 总量</span>
              <strong id="hero-chunk-count">-</strong>
              <span class="hero-stat-note">当前文档已入库并参与检索的切片数量</span>
            </div>
            <div class="hero-stat">
              <span class="hero-stat-label">浏览模式</span>
              <strong>系统切片视图</strong>
              <span class="hero-stat-note">用于排查切片边界、检索命中和向量化输入</span>
            </div>
            <div class="hero-action-stack">
              <a id="chunk-document-link" class="card-link" href="#">返回原文正文页</a>
            </div>
          </div>
        </div>
      </header>

      <section class="panel">
        <div class="panel-head">
          <div>
            <h2>Chunk 原文</h2>
            <p>这里展示系统实际保存到 `kb_chunk.content` 的文本切片。</p>
          </div>
          <div id="chunk-pagination-summary" class="pagination-summary"></div>
        </div>
        <div id="chunk-error" class="notice notice-error hidden"></div>
        <div id="document-chunks" class="content-section"></div>
        <div class="pagination-bar">
          <button id="chunk-prev-page" class="ghost-button" type="button">上一页</button>
          <div id="chunk-page-indicator" class="page-indicator">第 1 页</div>
          <button id="chunk-next-page" class="ghost-button" type="button">下一页</button>
        </div>
      </section>
    </div>

    <script src="/assets/js/app.js" defer></script>
  </body>
</html>
